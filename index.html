<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Message</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* Lite Black Background */
        body {
            background-color: #242424;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            color: white; text-align: center;
            position: relative;
        }

        /* Deep Pitch Black Popup Box */
        .popup {
            background: #000000; 
            border: 1px solid #3a3a3a;
            padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            max-width: 420px; width: 90%;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        h3 { margin-top: 0; font-weight: 500; line-height: 1.4; color: #f0f0f0; min-height: 60px; display: flex; align-items: center; justify-content: center; }

        /* Button Layout */
        .btn-container {
            display: flex; justify-content: center; gap: 25px;
            margin-top: 30px; position: relative;
        }

        /* Circular Icon Buttons */
        .btn {
            width: 65px; height: 65px; border-radius: 50%;
            border: none; font-size: 28px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s ease, background-color 0.2s ease, opacity 0.3s ease;
        }
        .btn:active { transform: scale(0.92); }

        /* Icon Colors */
        .btn-green { background-color: #2ecc71; color: white; }
        .btn-green:hover { background-color: #27ae60; }
        .btn-red { background-color: #e74c3c; color: white; }
        .btn-red:hover { background-color: #c0392b; }

        /* Teleporting State Override */
        .teleporting {
            position: fixed !important;
            z-index: 999;
            transition: none !important;
        }

        /* Floating Toast Message Overlay */
        #toast-notification {
            position: fixed; top: -100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.95);
            color: white; padding: 12px 24px;
            border-radius: 30px; font-size: 14px;
            font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000; pointer-events: none;
            white-space: nowrap;
        }
        #toast-notification.show { top: 25px; }

        /* Overlay for "Are you sure?" popup */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .transparent { opacity: 0; pointer-events: none; }

        /* Final Image Display Container */
        #final-image-container {
            width: 100%;
            height: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
        }
        #reveal-image {
            max-width: 90%; max-height: 65vh;
            border-radius: 10px; box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            margin-bottom: 20px;
        }

        /* Absolute bottom placement for the text line */
        .credit-text {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.55); /* Light White */
            font-size: 13.5px; 
            width: 90%;
            max-width: 500px;
            line-height: 1.4;
            user-select: text; -webkit-user-select: text; 
        }
        .credit-link {
            color: #2ecc71; text-decoration: none; font-weight: 600;
            transition: color 0.2s ease, text-decoration 0.2s ease;
        }
        .credit-link:hover {
            color: #27ae60; text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="toast-notification">You missed the button!</div>

    <div id="main-popup" class="popup">
        <h3 id="main-text">Do you want to open this file?</h3>
        <div class="btn-container" id="main-btn-wrapper">
            <button id="main-tick" class="btn btn-green">✓</button>
            <button id="main-cross" class="btn btn-red">✗</button>
        </div>
    </div>

    <div id="sure-overlay" class="overlay hidden">
        <div class="popup" style="max-width: 300px;">
            <h3>Are you sure?</h3>
            <div class="btn-container">
                <button id="sure-tick" class="btn btn-green">✓</button>
                <button id="sure-cross" class="btn btn-red">✗</button>
            </div>
        </div>
    </div>

    <div id="final-image-container" class="hidden">
        <img id="reveal-image" src="fun-fun.jpg" alt="Prank Reveal">
        <button onclick="location.reload()" class="btn btn-green" style="border-radius: 10px; width: auto; padding: 0 20px; font-size: 16px; height: 40px;">Play Again?</button>
        
        <div class="credit-text">
            If you also want to create website <a class="credit-link" href="https://adityaff7052.github.io/just_trying/" target="_blank">visit this link</a>
        </div>
    </div>

    <script>
        // DOM Elements
        const mainPopup = document.getElementById('main-popup');
        const mainText = document.getElementById('main-text');
        const mainTickBtn = document.getElementById('main-tick');
        const mainCrossBtn = document.getElementById('main-cross');
        const sureOverlay = document.getElementById('sure-overlay');
        const finalContainer = document.getElementById('final-image-container');
        const toast = document.getElementById('toast-notification');

        // Logic Variables
        let gameState = "start"; 
        let clickCount = 0;
        let swapCount = 0;
        let isSwapped = false;
        let toastTimeout;
        
        const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // --- 50 CYCLING QUESTIONS ARRAY ---
        const genericPhrases = [
            "Are you sure?",
            "Are you really sure?",
            "Just think once more...",
            "Before clicking tick think about your future.",
            "Think about your friend.",
            "Are you absolutely positive?",
            "Is this your final answer?",
            "There is no turning back after this.",
            "Are you completely conscious right now?",
            "Did you double check your choices?",
            "Wait, think about it one more time...",
            "Are you 100% certain?",
            "Is your finger sure it wants to tap that?",
            "Are you rushing into things?",
            "Are you mentally prepared for the next step?",
            "Would your mother approve of this click?",
            "Have you weighed all the consequences?",
            "Are you acting on pure emotion right now?",
            "Are you sure you aren't dreaming?",
            "Is this choice aligned with your goals?",
            "What if this changes everything?",
            "Are you ready to face reality?",
            "Anti-bot verification active. Keep clicking.",
            "Is your choice completely objective?",
            "Are you structurally ready for what's next?", 
            "Are you really, really, really sure?",
            "Did you read the fine print?",
            "Is this your gut feeling speaking?",
            "Are you trying to fast-track this process?",
            "Have you slept enough to make this decision?",
            "Are you just clicking to see what happens?",
            "Is this a calculated risk?",
            "Are you sure you want to pull this trigger?",
            "Will you regret this in 5 seconds?",
            "Is there a better option out there?",
            "Are you ignoring the warning signs?",
            "Is this your final destination?",
            "Are you keeping a cool head?",
            "Are you testing your limits?",
            "Are you sure you didn't click by mistake?",
            "Is your device battery ready for this?",
            "Are you listening to your common sense?",
            "Is this a leap of faith?",
            "Are you prepared for the ultimate outcome?",
            "Are you sure this is a good idea?",
            "Are you playing with fire?",
            "Is this the point of no return?",
            "Are you ready to finalize?",
            "Are you absolutely, unconditionally sure?",
            "Are you ready for the final step?"
        ];

        // --- MISSED BUTTON TOAST STRINGS ---
        const toastPhrases = [
            "You missed the button!",
            "Did you click it by mistake?",
            "What are you doing? This is a crime!"
        ];

        // --- AUDIO ENGINE LOGIC ---
        const audio1 = new Audio('click-sound.mp3');
        const audio2 = new Audio('click-sound2.mp3'); 

        function playSound1() {
            audio1.currentTime = 0;
            audio1.play().catch(e => { console.log("Audio 1 optimized."); });
        }

        function playSound2() {
            audio2.currentTime = 0;
            audio2.play().catch(e => { console.log("Audio 2 optimized."); });
        }

        function showToast() {
            if (gameState === "loading") return; 
            clearTimeout(toastTimeout);
            const randomMsg = toastPhrases[Math.floor(Math.random() * toastPhrases.length)];
            toast.innerText = randomMsg;
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        // --- TELEPORT ENGINE ---
        function moveElementRandomly(el) {
            if (!el.classList.contains('teleporting')) {
                el.classList.add('teleporting');
            }

            const padding = 100; 
            const maxX = window.innerWidth - padding;
            const maxY = window.innerHeight - padding;
            
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px';
        }

        // Cross button triggers layout changes and click sound 2
        mainCrossBtn.addEventListener('touchstart', (e) => {
            if (gameState === "loading") return;
            if (gameState === "marathon") {
                e.preventDefault(); 
                playSound2(); 
                moveElementRandomly(mainCrossBtn);
                showToast();
            }
        });

        mainCrossBtn.addEventListener('mouseover', () => {
            if (gameState === "loading") return;
            if (gameState === "marathon") {
                playSound2(); 
                moveElementRandomly(mainCrossBtn);
                showToast();
            }
        });

        // --- MAIN BUTTON CLICK HANDLERS ---
        
        mainTickBtn.addEventListener('click', () => {
            if (gameState === "loading") return; 
            playSound1();
            if (gameState === "start") {
                startMarathon();
            } else if (gameState === "twist") {
                handleTwistClick();
            } else {
                handleMarathonClick();
            }
        });

        mainCrossBtn.addEventListener('click', () => {
            if (gameState === "loading") return; 
            playSound1(); 
            if (gameState === "start") {
                sureOverlay.classList.remove('hidden'); 
            } else if (gameState === "twist") {
                handleTwistClick();
            }
        });

        // --- "ARE YOU SURE" SELECTION LOGIC ---
        document.getElementById('sure-tick').addEventListener('click', () => {
            playSound1();
            sureOverlay.classList.add('hidden');
            startMarathon(); 
        });

        document.getElementById('sure-cross').addEventListener('click', () => {
            playSound1();
            sureOverlay.classList.add('hidden');
            mainCrossBtn.classList.add('transparent'); 
            mainText.innerText = "Choice updated. Please proceed.";
        });

        // --- CORE STATE DRIVERS ---

        function startMarathon() {
            gameState = "marathon";
            mainCrossBtn.classList.remove('transparent'); 
            clickCount = 1;
            mainText.innerText = genericPhrases[clickCount - 1];
        }

        function handleMarathonClick() {
            if (gameState !== "marathon") return;

            clickCount++;

            // --- TELEPORT TICK BUTTON EVERY 5 CLICKS ---
            if (clickCount % 5 === 0) {
                moveElementRandomly(mainTickBtn);
            }

            // --- 15 CLICK LOADING SCREEN ---
            if (clickCount === 15) {
                triggerLoadingScreen("Verifying system storage integrity... Please wait.", 4500);
                return;
            }

            // --- MID-WAY TWIST (Click 25 Setup) ---
            if (clickCount === 25) {
                gameState = "twist";
                swapCount = 0;
                
                // Clear active running positions to reset back inside standard popup
                mainCrossBtn.classList.remove('teleporting');
                mainCrossBtn.style.position = ''; mainCrossBtn.style.left = ''; mainCrossBtn.style.top = '';
                
                mainTickBtn.classList.remove('teleporting');
                mainTickBtn.style.position = ''; mainTickBtn.style.left = ''; mainTickBtn.style.top = '';
                
                mainText.innerHTML = "Wait!<br>Did you know? <span style='color:#2ecc71'>Green (✓)<br>means OK</span> , <span style='color:#e74c3c'>Red (✗)<br>means NO !</span><br>to wipe , to cancel";
                return; 
            }

            // --- 35 CLICK LOADING SCREEN ---
            if (clickCount === 35) {
                triggerLoadingScreen("Processing configuration profiles... Please wait.", 4500);
                return;
            }

            // --- 45 CLICK LOADING SCREEN ---
            if (clickCount === 45) {
                triggerLoadingScreen("Applying final security block updates... Do not disconnect.", 4500);
                return;
            }

            if (clickCount <= 50) {
                mainText.innerText = genericPhrases[clickCount - 1];
            }

            if (clickCount >= 50) {
                gameState = "revealPrompt";
                showRevealPrompt();
            }
        }

        // --- LOADING SCREEN CONTROLLER ---
        function triggerLoadingScreen(message, duration) {
            gameState = "loading";
            
            mainCrossBtn.classList.add('hidden');
            mainTickBtn.classList.add('hidden');
            
            mainText.innerText = message;

            setTimeout(() => {
                gameState = "marathon";
                
                mainTickBtn.classList.remove('hidden');
                mainCrossBtn.classList.remove('hidden');
                
                mainText.innerText = genericPhrases[clickCount - 1];
            }, duration);
        }

        // --- 5-TIME SWAP LOGIC HANDLER ---
        function handleTwistClick() {
            swapCount++;
            isSwapped = !isSwapped;

            if (isSwapped) {
                mainTickBtn.className = "btn btn-red";
                mainTickBtn.innerText = "✗";
                mainCrossBtn.className = "btn btn-green";
                mainCrossBtn.innerText = "✓";
            } else {
                mainTickBtn.className = "btn btn-green";
                mainTickBtn.innerText = "✓";
                mainCrossBtn.className = "btn btn-red";
                mainCrossBtn.innerText = "✗";
            }

            if (swapCount >= 5) {
                gameState = "marathon"; 
                isSwapped = false;
                
                mainTickBtn.className = "btn btn-green";
                mainTickBtn.innerText = "✓";
                mainCrossBtn.className = "btn btn-red";
                mainCrossBtn.innerText = "✗";
                
                mainCrossBtn.classList.add('teleporting');
                
                clickCount = 26;
                mainText.innerText = genericPhrases[clickCount - 1];
            }
        }

        // --- FINAL OUTCOME PRESENTATION PANELS ---
        function showRevealPrompt() {
            // Remove tracking overrides on tick layout to center cleanly
            mainTickBtn.classList.remove('teleporting');
            mainTickBtn.style.position = ''; mainTickBtn.style.left = ''; mainTickBtn.style.top = '';
            
            mainText.innerText = "Process complete. Are you ready to see the image?";
            mainCrossBtn.classList.add('hidden');
            mainTickBtn.className = "btn btn-green"; 
            mainTickBtn.innerText = "✓";
            mainTickBtn.style.margin = "0 auto"; 
        }

        mainTickBtn.addEventListener('click', () => {
            if (gameState === "revealPrompt") {
                revealFinalImage();
            }
        });

        function revealFinalImage() {
            playSound1();
            mainPopup.classList.add('hidden');
            finalContainer.classList.remove('hidden');
            document.title = "Gotcha!";
        }
    </script>
</body>
</html>
